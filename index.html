<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fusion Mobile Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #0f0f0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        header {
            position: absolute;
            top: 20px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .video-container {
            width: 90%;
            max-width: 500px;
            aspect-ratio: 9 / 16;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255,255,255,0.1);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
        }

        @media (max-width: 480px) {
            header {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

    <header>
        Fusion Mobile Lab
    </header>

    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <footer>
        Mahaboudha, Kathmandu • Mobile Repair Specialist
    </footer>

</body>
</html>
